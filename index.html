<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History Factory</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>History Factory</h1>

    <!-- Game Info -->
    <div id="info">
        <h2 id="era">Era: Agricultural Revolution</h2>
        <h2 id="money">Money: $0</h2>
    </div>
   
    <hr>

    <!-- Factory Area -->
<div id="gameLayout">

    <div id="factory">

        <!-- MACHINE A -->
        <div id="machineA" class="machine farm">
            <h2>Farm Station</h2>
            <div id="lightA" class="light"></div>
            <p>Press A</p>
        </div>

        <!-- MACHINE S -->
        <div id="machineS" class="machine sewing hidden">
            <h2>Sewing Machine</h2>
            <div id="lightS" class="light"></div>
            <p>Press S</p>
        </div>

        <!-- MACHINE D -->
        <div id="machineD" class="machine cnc hidden">
            <h2>CNC Mill</h2>
            <div id="lightD" class="light"></div>
            <p>Press D</p>
        </div>

        <!-- MACHINE F -->
        <div id="machineF" class="machine future hidden">
            <h2>Planet Factory</h2>
            <div id="lightF" class="light"></div>
            <p>Press F</p>
        </div>

    </div>

</div>
    <hr>
<div id="sidePanel">
    <!-- Upgrade Area (you will build later) -->
     <div id="history">

        <h2>History Fact</h2>

        <p id="fact">
            <p id="fact"></p>
        </p>

    </div>
    <div id="upgrades">

    <h2>Upgrades</h2>

    <div id="upgradeList"></div>
    </div>
    </div> 
</div>
</div>


    <hr>

    <!-- History Panel -->
 

    <script src="script.js"></script>
</body>
</html>
