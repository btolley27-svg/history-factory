<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History Factory</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>History Factory</h1>

    <!-- Game Info -->
    <div id="info">
        <h2 id="era">Era: Agricultural Revolution</h2>
        <h2 id="money">Money: $0</h2>
    </div>

    <hr>

    <!-- Factory Area -->
    <div id="factory">

        <h2>Farm Station</h2>

        <div id="light"></div>

        <p>Press <b>A</b> when the light is GREEN</p>

    </div>

    <hr>

    <!-- Upgrade Area (you will build later) -->
    <div id="upgrades">

        <h2>Upgrades</h2>

        <button id="upgradeBtn">
            Buy Stone Tools ($50)
        </button>

        <p id="upgradeInfo">
            Improves farming efficiency
        </p>

    </div>

    <hr>

    <!-- History Panel -->
    <div id="history">

        <h2>History Fact</h2>

        <p id="fact">
            This era used early farming techniques and simple hand tools.
        </p>

    </div>

    <script src="script.js"></script>
</body>
</html>
